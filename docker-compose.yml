services:
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tasktracker
      POSTGRES_PASSWORD: tasktracker
      POSTGRES_DB: tasktracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
